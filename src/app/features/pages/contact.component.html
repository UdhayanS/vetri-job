<div class="page">
  <div class="page-header">
    <div class="header-bubbles">
      <div class="bubble bubble-1"></div>
      <div class="bubble bubble-2"></div>
      <div class="bubble bubble-3"></div>
    </div>
    <h1>Contact Us</h1>
    <p>We'd love to hear from you</p>
  </div>
  <div class="container">
    <div class="content">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Have a question or feedback? We'd love to hear from you!</p>
        
        <div class="info-item">
          <span class="icon">📧</span>
          <div>
            <strong>Email</strong>
            <p>contact&#64;vetrijobs.com</p>
          </div>
        </div>
        
        <div class="info-item">
          <span class="icon">🌐</span>
          <div>
            <strong>Website</strong>
            <p>vetri-jobs.netlify.app</p>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <h2>Send us a Message</h2>
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" formControlName="name" placeholder="Your name">
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" formControlName="email" placeholder="your&#64;email.com">
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input id="subject" type="text" formControlName="subject" placeholder="How can we help?">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" formControlName="message" rows="5" placeholder="Your message..."></textarea>
          </div>
          
          <button type="submit" [disabled]="!contactForm.valid || submitting">
            {{ submitting ? 'Sending...' : 'Send Message' }}
          </button>
          
          <div class="success-message" *ngIf="successMessage">
            {{ successMessage }}
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
