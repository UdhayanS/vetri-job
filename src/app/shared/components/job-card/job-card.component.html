<div class="job-card" [routerLink]="['/jobs', job.slug]">
  <div class="card-header">
    <div class="company-logo">
      <img [src]="job.companyLogo || 'assets/default-logo.png'" [alt]="job.company" onerror="this.src='assets/default-logo.png'">
    </div>
    <div class="card-badges">
      <span class="featured-badge" *ngIf="job.featured === 'Yes'">⭐ Featured</span>
      <span class="new-badge" *ngIf="isNew">New</span>
    </div>
  </div>
  
  <div class="card-body">
    <div class="company-name">{{ job.company }}</div>
    <h3 class="job-title">{{ job.title }}</h3>
    <div class="posted-date">{{ utilityService.formatDate(job.postedDate) }}</div>
    
    <div class="job-info">
      <div class="info-item">
        <span class="info-icon">📍</span>
        <span>{{ job.location }}</span>
      </div>
      <div class="info-item" *ngIf="job.salary">
        <span class="info-icon">💰</span>
        <span>{{ job.salary }}</span>
      </div>
      <div class="info-item">
        <span class="info-icon">⏱️</span>
        <span>{{ job.experience }}</span>
      </div>
      <div class="info-item">
        <span class="info-icon">📋</span>
        <span>{{ job.jobType }}</span>
      </div>
    </div>
    
    <div class="job-category">
      <span>{{ job.category }}</span>
    </div>
  </div>
  
  <div class="card-footer">
    <button class="view-details-btn" (click)="onViewDetails($event)">
      View Details
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</div>
