<header class="header">
  <nav class="nav-container">
    <a routerLink="/" class="logo">
      <img src="assets/images/vetrijobs-logo.png" alt="Vetri Jobs" class="logo-img">
    </a>
    
    <div class="nav-links" [class.mobile-open]="mobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/jobs" routerLinkActive="active" (click)="closeMobileMenu()">Jobs</a>
      <a routerLink="/categories" routerLinkActive="active" (click)="closeMobileMenu()">Categories</a>
      <a routerLink="/blogs" routerLinkActive="active" (click)="closeMobileMenu()">Blog</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
    </div>
    
    <div class="nav-actions">
      <button class="qr-toggle" (click)="toggleQrModal()" aria-label="Show QR Code">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
      </button>
      
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <span class="theme-icon" [class.dark]="isDarkMode">☀️</span>
        <span class="theme-icon" [class.light]="!isDarkMode">🌙</span>
      </button>
      
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
        <span [class.open]="mobileMenuOpen">☰</span>
      </button>
    </div>
  </nav>
</header>

<div class="qr-modal-overlay" *ngIf="qrModalOpen" (click)="closeQrModal()">
  <div class="qr-modal" (click)="$event.stopPropagation()">
    <button class="qr-close-btn" (click)="closeQrModal()" aria-label="Close QR Code">&times;</button>
    <h3>Scan QR Code</h3>
    <div class="qr-code-container">
      <qrcode [qrdata]="qrUrl" [width]="200" [errorCorrectionLevel]="'M'"></qrcode>
    </div>
    <p class="qr-url">{{qrUrl}}</p>
    <button class="whatsapp-share-btn" (click)="shareOnWhatsApp()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

      Share on WhatsApp
    </button>
  </div>
</div>
